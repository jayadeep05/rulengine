server {
    server_name deepcodev.com www.deepcodev.com ec2-13-48-212-110.eu-north-1.compute.amazonaws.com;

    # Trading Bot - Proxy to FastAPI on port 8000
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_http_version 1.1;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/deepcodev.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/deepcodev.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.deepcodev.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = deepcodev.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name deepcodev.com www.deepcodev.com ec2-13-48-212-110.eu-north-1.compute.amazonaws.com;
    return 404;
}
